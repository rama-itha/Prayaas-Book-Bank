<svg width="280" height="560" viewBox="0 0 280 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="screenClip">
      <rect x="12" y="20" width="256" height="496" rx="28"/>
    </clipPath>
  </defs>
  <!-- device body -->
  <rect x="2" y="2" width="276" height="556" rx="38" fill="#1C1C1E" stroke="#3A3A3C" stroke-width="1.5"/>
  <rect x="10" y="18" width="260" height="500" rx="30" fill="#0F0F0F"/>
  <!-- notch -->
  <rect x="95" y="18" width="90" height="22" rx="0 0 11 11" fill="#1C1C1E"/>
  <!-- screen content -->
  <g clip-path="url(#screenClip)">
    
  <!-- bar -->
  <rect x="12" y="20" width="256" height="38" fill="#E8621A"/>
  <rect x="18" y="28" width="24" height="24" rx="12" fill="rgba(255,255,255,.2)"/>
  <text x="30" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="white">‹</text>
  <text x="140" y="43" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">Book Details</text>
  <!-- hero -->
  <rect x="12" y="58" width="256" height="150" fill="#E8621A"/>
  <rect x="100" y="68" width="80" height="108" rx="9" fill="#3949AB" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
  <text x="140" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" font-weight="700" fill="white">Data Structures</text>
  <text x="140" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,.8)">&amp; Algorithms</text>
  <text x="140" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="white">Data Structures and Algorithms</text>
  <text x="140" y="214" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,.8)">by Thomas H. Cormen</text>
  <!-- white card -->
  <rect x="22" y="218" width="236" height="272" rx="18" fill="#1E1E1E" stroke="#2A2A2A" stroke-width=".5"/>
