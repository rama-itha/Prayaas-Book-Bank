<svg width="280" height="560" viewBox="0 0 280 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="screenClip">
      <rect x="12" y="20" width="256" height="496" rx="28"/>
    </clipPath>
  </defs>
  <!-- device body -->
  <rect x="2" y="2" width="276" height="556" rx="38" fill="#1C1C1E" stroke="#3A3A3C" stroke-width="1.5"/>
  <rect x="10" y="18" width="260" height="500" rx="30" fill="#0F0F0F"/>
  <!-- notch -->
  <rect x="95" y="18" width="90" height="22" rx="0 0 11 11" fill="#1C1C1E"/>
  <!-- screen content -->
  <g clip-path="url(#screenClip)">
    
  <!-- orange arc bg -->
  <rect x="12" y="20" width="256" height="260" rx="0" fill="#E8621A"/>
  <ellipse cx="140" cy="280" rx="160" ry="40" fill="#0F0F0F"/>
  <!-- logo circle -->
  <circle cx="140" cy="160" r="46" fill="#FFFFFF" opacity=".12"/>
  <circle cx="140" cy="160" r="38" fill="white"/>
  <!-- flower icon simplified -->
  <ellipse cx="140" cy="148" rx="12" ry="12" fill="#E8621A"/>
  <ellipse cx="128" cy="142" rx="8" ry="8" fill="#E8621A" opacity=".8"/>
  <ellipse cx="152" cy="142" rx="8" ry="8" fill="#E8621A" opacity=".8"/>
  <ellipse cx="122" cy="152" rx="6" ry="6" fill="#F4884A" opacity=".7"/>
  <ellipse cx="158" cy="152" rx="6" ry="6" fill="#F4884A" opacity=".7"/>
  <circle cx="140" cy="148" r="5" fill="white"/>
  <line x1="140" y1="160" x2="140" y2="178" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <path d="M140 170 Q130 167 128 172 Q133 176 140 174" fill="#1a1a1a"/>
  <path d="M140 174 Q150 171 152 176 Q147 180 140 178" fill="#1a1a1a"/>
  <!-- title -->
  <text x="140" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="white">Prayaas Book Bank</text>
  <text x="140" y="238" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,.8)">Your college library, simplified</text>
  <!-- prompt -->
  <text x="140" y="282" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#A0A0A0">Select your role to continue</text>
  <!-- student card -->
  <rect x="26" y="294" width="228" height="56" rx="14" fill="#1E1E1E" stroke="#333" stroke-width=".5"/>
  <rect x="36" y="303" width="36" height="36" rx="10" fill="#3A1800"/>
  <text x="54" y="326" text-anchor="middle" font-size="18">🎓</text>
  <text x="88" y="320" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#F0F0F0">Student</text>
  <text x="88" y="334" font-family="system-ui,sans-serif" font-size="9" fill="#A0A0A0">Browse &amp; checkout books</text>
  <text x="240" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#666666">›</text>
  <!-- admin card -->
  <rect x="26" y="358" width="228" height="56" rx="14" fill="#1E1E1E" stroke="#333" stroke-width=".5"/>
  <rect x="36" y="367" width="36" height="36" rx="10" fill="#1A1C30"/>
  <text x="54" y="390" text-anchor="middle" font-size="18">🛡️</text>
  <text x="88" y="384" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#F0F0F0">Admin</text>
  <text x="88" y="398" font-family="system-ui,sans-serif" font-size="9" fill="#A0A0A0">Manage orders &amp; issuance</text>
  <text x="240" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#666666">›</text>
  <!-- footer -->
  <text x="140" y="490" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666666">Prayaas Book Bank · College Library System</text>

  </g>
</svg>