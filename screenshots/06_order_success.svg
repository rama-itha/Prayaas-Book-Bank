<svg width="280" height="560" viewBox="0 0 280 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="screenClip">
      <rect x="12" y="20" width="256" height="496" rx="28"/>
    </clipPath>
  </defs>
  <!-- device body -->
  <rect x="2" y="2" width="276" height="556" rx="38" fill="#1C1C1E" stroke="#3A3A3C" stroke-width="1.5"/>
  <rect x="10" y="18" width="260" height="500" rx="30" fill="#0F0F0F"/>
  <!-- notch -->
  <rect x="95" y="18" width="90" height="22" rx="0 0 11 11" fill="#1C1C1E"/>
  <!-- screen content -->
  <g clip-path="url(#screenClip)">
    
  <rect x="12" y="20" width="256" height="516" fill="#0F0F0F"/>
  <!-- success circle -->
  <circle cx="140" cy="120" r="44" fill="#1B3A1C"/>
  <text x="140" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36" font-weight="900" fill="#4CAF50">✓</text>
  <text x="140" y="184" text-anchor="middle" font-family="system-ui,sans-serif" font-size="19" font-weight="800" fill="#F0F0F0">Order Placed!</text>
  <text x="140" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#A0A0A0">Your books have been reserved</text>
  <!-- confirmation card -->
  <rect x="22" y="214" width="236" height="172" rx="16" fill="#1E1E1E" stroke="#2A2A2A" stroke-width=".5"/>
  <text x="32" y="232" font-family="system-ui,sans-serif" font-size="8" fill="#666666">Order #DEMO-87654321</text>
  <text x="32" y="248" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#F0F0F0">Hi, Rahul!</text>
  <text x="32" y="264" font-family="system-ui,sans-serif" font-size="8" fill="#A0A0A0">Confirmation sent to rahul@college.edu</text>
  <line x1="32" y1="274" x2="248" y2="274" stroke="#2A2A2A" stroke-width=".5"/>
  <text x="32" y="290" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#F0F0F0">Books checked out:</text>
  
  <circle cx="32" cy="349" r="4" fill="#3949AB"/>
  <text x="42" y="354" font-family="system-ui,sans-serif" font-size="8.5" fill="#F0F0F0">Data Structures & Algorithms</text>
  <text x="250" y="354" text-anchor="end" font-family="system-ui,sans-serif" font-size="8" fill="#A0A0A0">Cormen</text>

  <circle cx="32" cy="369" r="4" fill="#C62828"/>
  <text x="42" y="374" font-family="system-ui,sans-serif" font-size="8.5" fill="#F0F0F0">Computer Networks</text>
  <text x="250" y="374" text-anchor="end" font-family="system-ui,sans-serif" font-size="8" fill="#A0A0A0">Tanenbaum</text>

  <circle cx="32" cy="389" r="4" fill="#1565C0"/>
  <text x="42" y="394" font-family="system-ui,sans-serif" font-size="8.5" fill="#F0F0F0">Engineering Mathematics</text>
  <text x="250" y="394" text-anchor="end" font-family="system-ui,sans-serif" font-size="8" fill="#A0A0A0">Grewal</text>

  <!-- pickup card -->
  <rect x="22" y="396" width="236" height="72" rx="13" fill="#0D2744" stroke="#1A2A3A" stroke-width=".5"/>
  <text x="34" y="415" font-family="system-ui,sans-serif" font-size="8.5" fill="#64B5F6">📍 Prayaas Book Bank counter</text>
  <text x="34" y="430" font-family="system-ui,sans-serif" font-size="8.5" fill="#64B5F6">🕙 10 AM – 5 PM, Mon–Sat</text>
  <text x="34" y="445" font-family="system-ui,sans-serif" font-size="8.5" fill="#64B5F6">🪪 Carry your college ID card</text>
  <!-- button -->
  <rect x="22" y="480" width="236" height="36" rx="12" fill="#E8621A"/>
  <text x="140" y="503" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white">← Back to Catalogue</text>

  </g>
</svg>