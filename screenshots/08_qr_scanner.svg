<svg width="280" height="560" viewBox="0 0 280 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="screenClip">
      <rect x="12" y="20" width="256" height="496" rx="28"/>
    </clipPath>
  </defs>
  <rect x="2" y="2" width="276" height="556" rx="38" fill="#1C1C1E" stroke="#3A3A3C" stroke-width="1.5"/>
  <rect x="10" y="18" width="260" height="500" rx="30" fill="#0F0F0F"/>
  <rect x="95" y="18" width="90" height="22" rx="0 0 11 11" fill="#1C1C1E"/>
  <g clip-path="url(#screenClip)">
    
  <rect x="12" y="20" width="256" height="516" fill="#080808"/>
  <!-- top bar -->
  <rect x="18" y="30" width="30" height="30" rx="15" fill="rgba(255,255,255,.15)"/>
  <text x="33" y="49" text-anchor="middle" font-size="16" fill="white">‹</text>
  <text x="60" y="42" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">Issue Book</text>
  <text x="60" y="56" font-family="system-ui,sans-serif" font-size="8.5" fill="rgba(255,255,255,.65)">Scan QR to issue copy to student</text>
  <!-- viewfinder frame -->
  <rect x="70" y="120" width="140" height="140" rx="14" fill="none" stroke="#E8621A" stroke-width="2"/>
  <!-- corner accents -->
  <polyline points="70,142 70,120 92,120" fill="none" stroke="#E8621A" stroke-width="4" stroke-linecap="round"/>
  <polyline points="188,120 210,120 210,142" fill="none" stroke="#E8621A" stroke-width="4" stroke-linecap="round"/>
  <polyline points="70,238 70,260 92,260" fill="none" stroke="#E8621A" stroke-width="4" stroke-linecap="round"/>
  <polyline points="210,238 210,260 188,260" fill="none" stroke="#E8621A" stroke-width="4" stroke-linecap="round"/>
  <!-- scan line -->
  <rect x="78" y="176" width="124" height="2" rx="1" fill="#E8621A" opacity=".85"/>
  <!-- simulated QR blocks inside frame -->
  <rect x="82" y="130" width="28" height="28" rx="4" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.2)" stroke-width=".5"/>
  <rect x="85" y="133" width="22" height="22" rx="2" fill="rgba(0,0,0,.6)"/>
  <rect x="100" y="148" rx="2" width="6" height="6" fill="rgba(255,255,255,.5)"/>
  <rect x="130" y="130" width="22" height="8" rx="2" fill="rgba(255,255,255,.1)"/>
  <rect x="156" y="130" width="12" height="12" rx="2" fill="rgba(255,255,255,.08)"/>
  <rect x="82" y="165" width="18" height="8" rx="2" fill="rgba(255,255,255,.1)"/>
  <rect x="104" y="165" width="8" height="8" rx="2" fill="rgba(255,255,255,.08)"/>
  <rect x="160" y="165" width="28" height="28" rx="4" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.2)" stroke-width=".5"/>
  <rect x="163" y="168" width="22" height="22" rx="2" fill="rgba(0,0,0,.6)"/>
  <rect x="170" y="175" rx="2" width="8" height="8" fill="rgba(255,255,255,.5)"/>
  <rect x="82" y="232" width="28" height="22" rx="4" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.2)" stroke-width=".5"/>
  <rect x="85" y="235" width="22" height="16" rx="2" fill="rgba(0,0,0,.6)"/>
  <rect x="120" y="238" width="14" height="6" rx="1" fill="rgba(255,255,255,.1)"/>
  <rect x="138" y="232" width="8" height="14" rx="2" fill="rgba(255,255,255,.08)"/>
  <!-- scan label -->
  <text x="140" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,.5)">Point camera at QR code on the book</text>
  <!-- bottom panel -->
  <rect x="12" y="296" width="256" height="240" rx="22 22 0 0" fill="#1E1E1E"/>
  <text x="26" y="320" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#F0F0F0">QR Code Scanned</text>
  <!-- result card -->
  <rect x="22" y="328" width="236" height="62" rx="10" fill="#2A2A2A"/>
  <rect x="30" y="336" width="42" height="46" rx="8" fill="#111"/>
  <!-- mini QR icon -->
  <rect x="33" y="339" width="36" height="36" rx="4" fill="white"/>
  <rect x="35" y="341" width="12" height="12" rx="2" fill="black"/>
  <rect x="51" y="341" width="12" height="12" rx="2" fill="black"/>
  <rect x="35" y="357" width="12" height="12" rx="2" fill="black"/>
  <rect x="51" y="355" width="6" height="6" rx="1" fill="black"/>
  <rect x="59" y="361" width="6" height="6" rx="1" fill="black"/>
  <text x="80" y="350" font-family="monospace,system-ui" font-size="10" font-weight="800" fill="#F0F0F0">DSA-LO01-002</text>
  <text x="80" y="364" font-family="system-ui,sans-serif" font-size="8" fill="#A0A0A0">Data Structures &amp; Algorithms</text>
  <rect x="80" y="369" width="70" height="13" rx="6.5" fill="#1B3A1C"/>
  <text x="115" y="379" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" font-weight="600" fill="#81C784">✓ Ready to issue</text>
  <!-- order info -->
  <text x="26" y="410" font-family="system-ui,sans-serif" font-size="9" fill="#A0A0A0">Issuing to: <tspan font-weight="700" fill="#F0F0F0">Priya Mehta</tspan> (ID: 2022CS047)</text>
  <!-- confirm button -->
  <rect x="22" y="420" width="236" height="40" rx="13" fill="#E8621A"/>
  <text x="140" y="445" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">✓  Confirm Issue</text>
  <!-- rescan button -->
  <rect x="22" y="468" width="236" height="34" rx="13" fill="none" stroke="#3A3A3A" stroke-width="1.5"/>
  <text x="140" y="489" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#A0A0A0">↩ Scan Again</text>

  </g>
</svg>